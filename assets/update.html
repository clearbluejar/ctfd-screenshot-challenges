{% extends "admin/challenges/update.html" %}

{% block value %}
<div class="form-group">
	<label>
		Full Value<br>
		<small class="form-text text-muted">
			Points awarded when the instructor approves the screenshot.
		</small>
	</label>
	<input type="number" class="form-control chal-value" name="value" value="{{ challenge.value }}" required>
</div>

<div class="form-group">
	<label>
		Submission Points<br>
		<small class="form-text text-muted">
			Partial credit awarded immediately when a student submits a screenshot (0 for no partial credit).
		</small>
	</label>
	<input type="number" class="form-control" name="submission_points" value="{{ challenge.submission_points }}">
</div>

<div class="form-group">
	<label>
		Allowed Extensions<br>
		<small class="form-text text-muted">
			Comma-separated list of allowed file extensions.
		</small>
	</label>
	<input type="text" class="form-control" name="allowed_extensions" value="{{ challenge.allowed_extensions }}">
</div>

<div class="form-group">
	<label>
		Max File Size (bytes)<br>
		<small class="form-text text-muted">
			Maximum upload size in bytes (default: 10485760 = 10MB).
		</small>
	</label>
	<input type="number" class="form-control" name="max_file_size" value="{{ challenge.max_file_size }}">
</div>
{% endblock %}

{% block function %}
{% endblock %}

{% block initial %}
{% endblock %}

{% block decay %}
{% endblock %}

{% block minimum %}
{% endblock %}
